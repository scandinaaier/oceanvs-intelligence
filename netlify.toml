[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# React SPA routes — rewrite to app.html so React Router takes over.
[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/app.html"
  status = 200
